<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Workspace Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-cloud"></i> <span>WORKSPACE</span>
            </div>
            <nav class="sidebar-menu">
                <button type="button" class="menu-item active" data-target="view-planner">
                    <i class="fa-regular fa-calendar-check"></i> <span>플래너 & 일정</span>
                </button>
                <button type="button" class="menu-item" data-target="view-memo">
                    <i class="fa-regular fa-file-lines"></i> <span>일반 메모장</span>
                </button>
                
                <div class="menu-group-wrapper">
                    <button type="button" class="menu-item" id="menu-btn-math" data-target="view-math">
                        <i class="fa-solid fa-book-open"></i> <span>📚 과목별 오답노트</span>
                    </button>
                    <div id="sidebar-sub-folders" class="sidebar-sub-list hidden"></div>
                </div>
            </nav>
            <div class="sidebar-footer" id="live-clock">00:00:00</div>
        </aside>

        <main class="main-content">
            
            <div id="view-planner" class="content-view">
                <div class="view-header">
                    <h2><i class="fa-regular fa-calendar-check"></i> 오늘의 플래너 & 주요 일정</h2>
                </div>
                <div class="two-col-grid">
                    <section class="panel">
                        <div class="panel-header">
                            <span class="panel-title">오늘의 플래너 계획</span>
                            <span class="badge" id="todo-stats">0 / 0 완료</span>
                        </div>
                        <form id="todo-form" class="inline-form">
                            <input type="text" id="todo-time-input" placeholder="시간 (예: 1교시)" style="max-width: 110px; border-right: 1px solid var(--panel-border);" required>
                            <input type="text" id="todo-input" placeholder="계획이나 할 일을 입력..." required>
                            <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                        </form>
                        <ul id="todo-list" class="item-list"></ul>
                    </section>
                    <section class="panel">
                        <div class="panel-header"><span class="panel-title">주요 디데이 카운트다운</span></div>
                        <form id="dday-form" class="inline-form">
                            <input type="text" id="dday-title" placeholder="목표/시험 이름" required>
                            <div class="date-input-wrapper"><input type="date" id="dday-date" required></div>
                            <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                        </form>
                        <div id="dday-container" class="dday-vertical-list"></div>
                    </section>
                </div>
            </div>

            <div id="view-memo" class="content-view hidden">
                <div class="view-header">
                    <h2><i class="fa-regular fa-file-lines"></i> 파일 분류별 일반 메모장</h2>
                </div>
                <section class="panel">
                    <div id="folder-explorer-zone">
                        <div class="panel-header">
                            <span class="panel-title">일반 메모 분류 보관함</span>
                            <button type="button" id="create-folder-btn" class="btn-primary-sm"><i class="fa-solid fa-folder-plus"></i> 새 분류 추가</button>
                        </div>
                        <div id="folder-grid-container" class="folder-grid"></div>
                    </div>
                    <div id="memo-editor-zone" class="hidden">
                        <div class="panel-header">
                            <button type="button" id="back-to-folders-btn" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 나가기</button>
                            <span class="current-folder-indicator" id="current-folder-title">폴더명</span>
                            <span class="save-status" id="save-status">새 메모</span>
                        </div>
                        <div class="textarea-wrapper">
                            <input type="text" id="memo-title-input" placeholder="메모 제목을 입력하세요...">
                            <textarea id="memo-textarea" placeholder="이 분류 폴더 내에 기록할 메모 내용을 적으세요..."></textarea>
                        </div>
                        <div class="memo-buttons-group">
                            <button id="clear-memo-btn" class="btn-secondary">비우기</button>
                            <button id="save-memo-btn" class="btn-save"><i class="fa-regular fa-floppy-disk"></i> 메모 저장</button>
                        </div>
                        <div class="memo-list-header">폴더 내부 저장 기록 (날짜별)</div>
                        <div id="saved-memos-container" class="memo-cards-grid"></div>
                    </div>
                </section>
            </div>

            <div id="view-math" class="content-view hidden">
                <div class="view-header">
                    <h2><i class="fa-solid fa-book-open"></i> 과목별 및 유형별 오답노트 관리</h2>
                </div>
                <section class="panel">
                    <div id="math-explorer-zone">
                        <div class="panel-header">
                            <span class="panel-title">과목 폴더 보관함 (🔼🔽 버튼으로 순서 조정 가능)</span>
                            <button type="button" id="math-create-folder-btn" class="btn-primary-sm"><i class="fa-solid fa-folder-plus"></i> 새 과목 추가</button>
                        </div>
                        <div id="math-folder-grid" class="folder-grid"></div>
                    </div>
                    
                    <div id="math-editor-zone" class="hidden">
                        <div class="panel-header" style="grid-column: 1 / -1; margin-bottom: 10px;">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <button type="button" id="math-back-btn" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 폴더 목록</button>
                                <span class="current-folder-indicator" id="math-current-folder-title">과목명</span>
                            </div>
                            <span class="save-status" id="math-save-status">새 문항 등록 모드</span>
                        </div>

                        <div class="math-split-container">
                            <div class="math-left-list-panel">
                                <div class="filter-wrapper">
                                    <select id="math-filter-type-select">
                                        <option value="ALL">전체 유형 보기</option>
                                        <option value="개념실수">⚠️ 개념 실수</option>
                                        <option value="계산실수">🧮 계산 실수</option>
                                        <option value="조건오독">🔍 조건 오독</option>
                                        <option value="고난도">🔥 고난도/신유형</option>
                                        <option value="기타">📝 기타 분류</option>
                                    </select>
                                    <button type="button" id="btn-toggle-sort" class="btn-sort-toggle"><i class="fa-solid fa-arrow-down-9-1"></i> 최신순</button>
                                </div>
                                <div id="math-saved-list" class="notebook-vertical-list"></div>
                            </div>

                            <div class="math-right-editor-panel">
                                <div class="math-notebook-form">
                                    <div class="input-inline-group">
                                        <input type="text" id="math-prob-title" placeholder="문제 출처나 문항 제목을 적으세요 (예: 6월 모평 22번)" style="flex: 1;">
                                        <select id="math-prob-type" style="width: 140px;">
                                            <option value="개념실수">⚠️ 개념 실수</option>
                                            <option value="계산실수">🧮 계산 실수</option>
                                            <option value="조건오독">🔍 조건 오독</option>
                                            <option value="고난도">🔥 고난도</option>
                                            <option value="기타" selected>📝 기타</option>
                                        </select>
                                    </div>
                                    
                                    <div class="input-block">
                                        <label><i class="fa-solid fa-circle-xmark" style="color:var(--danger);"></i> 틀린 이유 / 분석</label>
                                        <textarea id="math-prob-wrong" placeholder="무엇을 놓쳐서 틀렸는지 간단히 메모..."></textarea>
                                    </div>
                                    <div class="input-block">
                                        <label><i class="fa-regular fa-lightbulb" style="color:#f59e0b;"></i> 핵심 실마리 / 발상 아이디어</label>
                                        <textarea id="math-prob-approach" placeholder="이 문제를 풀 때 꼭 꺼내 써야 하는 핵심 개념단서 메모..."></textarea>
                                    </div>
                                    <div class="input-block">
                                        <label><i class="fa-solid fa-signature" style="color:#60a5fa;"></i> 전체 풀이 과정 / 해설</label>
                                        <textarea id="math-prob-solution" class="tall-textarea" placeholder="정확한 전개 풀이를 메모장처럼 자유롭게 적으세요..."></textarea>
                                    </div>
                                </div>

                                <div class="memo-buttons-group">
                                    <button id="math-clear-btn" class="btn-secondary">입력창 비우기</button>
                                    <button id="math-save-btn" class="btn-save"><i class="fa-regular fa-floppy-disk"></i> 오답 기록 저장/수정</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
