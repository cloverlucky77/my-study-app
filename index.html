<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Cloud Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar" id="main-sidebar">
            <div class="sidebar-brand">
                <div><i class="fa-solid fa-cloud"></i> <span>WORKSPACE</span></div>
                <button type="button" id="btn-close-sidebar" class="sidebar-toggle-inside"><i class="fa-solid fa-angles-left"></i></button>
            </div>
            <nav class="sidebar-menu">
                <button type="button" class="menu-item active" data-target="view-planner">
                    <i class="fa-regular fa-calendar-days"></i> <span>통합 플래너 & 달력</span>
                </button>
                
                <div class="menu-group-wrapper">
                    <button type="button" class="menu-item" id="menu-btn-memo" data-target="view-memo">
                        <i class="fa-regular fa-file-lines"></i> <span>메모장 & 고정메모</span>
                    </button>
                    <div id="sidebar-memo-folders" class="sidebar-sub-list hidden"></div>
                </div>
                
                <div class="menu-group-wrapper">
                    <button type="button" class="menu-item" id="menu-btn-math" data-target="view-math">
                        <i class="fa-solid fa-book-open"></i> <span>과목별 오답노트</span>
                    </button>
                    <div id="sidebar-sub-folders" class="sidebar-sub-list hidden"></div>
                </div>
            </nav>
            <div class="sidebar-footer" id="live-clock">00:00:00</div>
        </aside>

        <main class="main-content">
            
            <div id="view-planner" class="content-view">
                <div class="view-header">
                    <div class="header-left-zone">
                        <button type="button" id="btn-open-sidebar" class="sidebar-toggle-outside hidden"><i class="fa-solid fa-bars"></i></button>
                        <h2 id="calendar-view-title">2024년 00월</h2>
                    </div>
                </div>

                <div class="planner-integrated-grid">
                    <div class="calendar-panel panel">
                        <div class="calendar-controls">
                            <button id="prev-month"><i class="fa-solid fa-chevron-left"></i></button>
                            <span id="calendar-month-year">May 2024</span>
                            <button id="next-month"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                        <div class="calendar-grid" id="calendar-days">
                            </div>
                    </div>

                    <div class="daily-detail-stack">
                        <section class="panel">
                            <div class="panel-header">
                                <span class="panel-title" id="selected-date-label">오늘의 할 일</span>
                                <span class="badge" id="todo-stats">0/0</span>
                            </div>
                            <form id="todo-form" class="inline-form">
                                <input type="text" id="todo-time-input" placeholder="시간" style="max-width: 70px;">
                                <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." required>
                                <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                            </form>
                            <ul id="todo-list" class="item-list"></ul>
                        </section>

                        <section class="panel">
                            <div class="panel-header"><span class="panel-title">기한 임박 디데이</span></div>
                            <form id="dday-form" class="inline-form">
                                <input type="text" id="dday-title" placeholder="목표 이름" required>
                                <input type="date" id="dday-date" required>
                                <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                            </form>
                            <div id="dday-container" class="dday-vertical-list"></div>
                        </section>
                    </div>
                </div>
            </div>

            <div id="view-memo" class="content-view hidden">
                <div class="view-header">
                    <div class="header-left-zone">
                        <button type="button" class="sidebar-toggle-outside hidden aria-toggle-sidebar"><i class="fa-solid fa-bars"></i></button>
                        <h2><i class="fa-regular fa-file-lines"></i> 메모장 시스템</h2>
                    </div>
                </div>

                <div class="memo-layout-split">
                    <section class="panel pinned-memo-panel">
                        <div class="panel-header">
                            <span class="panel-title"><i class="fa-solid fa-thumbtack"></i> 실시간 고정 메모 (자동 저장)</span>
                            <span class="save-status" id="pinned-save-status">저장됨</span>
                        </div>
                        <textarea id="pinned-memo-textarea" placeholder="여기에 적는 내용은 하나로 유지되며 자동으로 수정/저장됩니다. 중요한 공지나 루틴을 적어두세요..."></textarea>
                    </section>

                    <section class="panel">
                        <div id="folder-explorer-zone">
                            <div class="panel-header">
                                <span class="panel-title">분류 보관함</span>
                                <button type="button" id="create-folder-btn" class="btn-primary-sm"><i class="fa-solid fa-folder-plus"></i> 새 분류</button>
                            </div>
                            <div id="folder-grid-container" class="folder-grid"></div>
                        </div>
                        <div id="memo-editor-zone" class="hidden">
                            <div class="panel-header">
                                <button type="button" id="back-to-folders-btn" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 목록</button>
                                <span class="current-folder-indicator" id="current-folder-title">폴더명</span>
                            </div>
                            <div class="textarea-wrapper">
                                <input type="text" id="memo-title-input" placeholder="제목">
                                <textarea id="memo-textarea" placeholder="내용을 적으세요..."></textarea>
                            </div>
                            <div class="memo-buttons-group">
                                <button id="save-memo-btn" class="btn-save">기록 저장</button>
                            </div>
                            <div id="saved-memos-container" class="memo-cards-grid"></div>
                        </div>
                    </section>
                </div>
            </div>

            <div id="view-math" class="content-view hidden">
                <div class="view-header">
                    <div class="header-left-zone">
                        <button type="button" class="sidebar-toggle-outside hidden aria-toggle-sidebar"><i class="fa-solid fa-bars"></i></button>
                        <h2><i class="fa-solid fa-book-open"></i> 오답노트</h2>
                    </div>
                </div>
                <section class="panel">
                    <div id="math-explorer-zone">
                        <div class="panel-header">
                            <span class="panel-title">과목 폴더</span>
                            <button type="button" id="math-create-folder-btn" class="btn-primary-sm"><i class="fa-solid fa-folder-plus"></i> 새 과목</button>
                        </div>
                        <div id="math-folder-grid" class="folder-grid"></div>
                    </div>
                    <div id="math-editor-zone" class="hidden">
                        <div class="panel-header">
                            <button type="button" id="math-back-btn" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 목록</button>
                            <span id="math-current-folder-title">과목명</span>
                            <button type="button" id="btn-manage-types" class="btn-secondary-sm">유형 편집</button>
                        </div>
                        <div class="math-split-container">
                            <div class="math-left-list-panel">
                                <select id="math-filter-type-select"><option value="ALL">전체</option></select>
                                <div id="math-saved-list" class="notebook-vertical-list"></div>
                            </div>
                            <div class="math-right-editor-panel">
                                <input type="text" id="math-prob-title" placeholder="문제 제목">
                                <select id="math-prob-type"></select>
                                <textarea id="math-prob-wrong" placeholder="틀린 이유"></textarea>
                                <textarea id="math-prob-approach" placeholder="접근법"></textarea>
                                <textarea id="math-prob-solution" class="tall-textarea" placeholder="상세 풀이"></textarea>
                                <button id="math-save-btn" class="btn-save">저장/수정</button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

        </main>
    </div>

    <div id="type-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header"><h3>유형 관리</h3><button id="close-type-modal">&times;</button></div>
            <div class="modal-body">
                <div class="inline-form">
                    <input type="text" id="new-type-input" placeholder="새 유형">
                    <button id="btn-add-type">+</button>
                </div>
                <div id="custom-type-list" class="custom-type-manage-list"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
