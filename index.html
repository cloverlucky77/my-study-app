<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Workspace Ultimate Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="top-bar">
            <div class="brand"><i class="fa-solid fa-layer-group"></i> WORKSPACE</div>
            <div id="live-clock" class="clock">00:00:00</div>
        </header>

        <main class="dashboard-grid">
            
            <div class="col">
                <section class="panel">
                    <div class="panel-header">
                        <span class="panel-title"><i class="fa-regular fa-calendar-check"></i> 오늘의 플래너</span>
                        <span class="badge" id="todo-stats">0 / 0 완료</span>
                    </div>
                    <form id="todo-form" class="inline-form">
                        <input type="text" id="todo-time-input" placeholder="시간 (예: 1교시, 14:00)" style="max-width: 140px; border-right: 1px solid var(--panel-border);" required>
                        <input type="text" id="todo-input" placeholder="계획이나 할 일을 입력하세요..." required>
                        <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                    </form>
                    <ul id="todo-list" class="item-list"></ul>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <span class="panel-title"><i class="fa-solid fa-fire"></i> 주요 디데이 일정</span>
                    </div>
                    <form id="dday-form" class="inline-form">
                        <input type="text" id="dday-title" placeholder="목표/시험 이름" required>
                        <div class="date-input-wrapper">
                            <input type="date" id="dday-date" required>
                        </div>
                        <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                    </form>
                    <div id="dday-container" class="dday-vertical-list"></div>
                </section>
            </div>

            <div class="col">
                <section class="panel memo-panel">
                    <div class="panel-header">
                        <span class="panel-title"><i class="fa-regular fa-folder-open"></i> 세분화 메모장</span>
                        <span class="save-status" id="save-status">모드: 새 메모 작성</span>
                    </div>
