<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Workspace Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="top-bar">
            <div class="brand"><i class="fa-solid fa-cloud"></i> CLOUD WORKSPACE</div>
            <div id="live-clock" class="clock">00:00:00</div>
        </header>

        <main class="dashboard-grid">
            
            <div class="col">
                <section class="panel">
                    <div class="panel-header">
                        <span class="panel-title"><i class="fa-regular fa-calendar-check"></i> 오늘의 플래너</span>
                        <span class="badge" id="todo-stats">0 / 0 완료</span>
                    </div>
                    <form id="todo-form" class="inline-form">
                        <input type="text" id="todo-time-input" placeholder="시간 (예: 1교시)" style="max-width: 120px; border-right: 1px solid var(--panel-border);" required>
                        <input type="text" id="todo-input" placeholder="계획이나 할 일을 입력하세요..." required>
                        <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                    </form>
                    <ul id="todo-list" class="item-list"></ul>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <span class="panel-title"><i class="fa-solid fa-fire"></i> 주요 디데이 일정</span>
                    </div>
                    <form id="dday-form" class="inline-form">
                        <input type="text" id="dday-title" placeholder="목표/시험 이름" required>
                        <div class="date-input-wrapper">
                            <input type="date" id="dday-date" required>
                        </div>
                        <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                    </form>
                    <div id="dday-container" class="dday-vertical-list"></div>
                </section>
            </div>

            <div class="col">
                <section class="panel memo-panel">
                    
                    <div id="folder-explorer-zone">
                        <div class="panel-header" style="margin-bottom: 12px;">
                            <span class="panel-title"><i class="fa-solid fa-folder-tree"></i> 파일 분류 관리함</span>
                            <button type="button" id="create-folder-btn" class="btn-primary-sm"><i class="fa-solid fa-folder-plus"></i> 새 분류 추가</button>
                        </div>
                        <div id="folder-grid-container" class="folder-grid"></div>
                    </div>

                    <div id="memo-editor-zone" class="hidden">
                        <div class="panel-header" style="margin-bottom: 12px;">
                            <button type="button" id="back-to-folders-btn" class="btn-back"><i class="fa-solid fa-arrow-left"></i> 나가기</button>
                            <span class="current-folder-indicator" id="current-folder-title">폴더명</span>
                            <span class="save-status" id="save-status">새 메모</span>
                        </div>

                        <div class="textarea-wrapper">
                            <input type="text" id="memo-title-input" placeholder="메모 제목을 입력하세요...">
                            <textarea id="memo-textarea" placeholder="이 파일 분류 안에 기록할 메모 내용을 적으세요..."></textarea>
                        </div>
                        
                        <div class="memo-buttons-group">
                            <button id="clear-memo-btn" class="btn-secondary">창 비우기</button>
                            <button id="save-memo-btn" class="btn-save"><i class="fa-regular fa-floppy-disk"></i> 파일 내 저장</button>
                        </div>

                        <div class="memo-list-header">현재 파일 내 저장된 기록 (날짜별 자동 분류)</div>
                        <div id="saved-memos-container" class="memo-cards-grid"></div>
                    </div>

                </section>
            </div>

        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
