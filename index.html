<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-graduation-cap"></i> MY STUDY APP</h1>
            <p class="subtitle">오늘도 몰입하는 나를 위해</p>
        </header>

        <main class="grid-layout">
            <section class="card timer-section">
                <h2><i class="fa-regular fa-clock"></i> Pomodoro Timer</h2>
                <div class="timer-display" id="timer">25:00</div>
                <div class="timer-status" id="timer-status">공부 시간!</div>
                <div class="button-group">
                    <button id="start-btn" class="btn btn-primary">시작</button>
                    <button id="pause-btn" class="btn btn-secondary">일시정지</button>
                    <button id="reset-btn" class="btn btn-outline">리셋</button>
                </div>
            </section>

            <section class="card todo-section">
                <h2><i class="fa-solid fa-list-check"></i> Today's Tasks</h2>
                <form id="todo-form" class="todo-input-group">
                    <input type="text" id="todo-input" placeholder="오늘 할 일을 입력하세요..." required>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i></button>
                </form>
                <ul id="todo-list" class="todo-list">
                    </ul>
            </section>

            <section class="card stats-section">
                <h2><i class="fa-solid fa-chart-simple"></i> Study Stats</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">완료한 목표</span>
                        <span class="stat-value" id="completed-count">0개</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">오늘 집중한 시간</span>
                        <span class="stat-value" id="total-focus-time">0분</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
