<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Cloud Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar" id="main-sidebar">
            <div class="sidebar-brand">
                <div><i class="fa-solid fa-cloud"></i> <span>WORKSPACE</span></div>
                <button type="button" id="btn-close-sidebar" class="sidebar-toggle-inside"><i class="fa-solid fa-angles-left"></i></button>
            </div>
            <nav class="sidebar-menu">
                <button type="button" class="menu-item active" data-target="view-planner">
                    <i class="fa-regular fa-calendar-days"></i> <span>통합 플래너 & 달력</span>
                </button>
                
                <div class="menu-group-wrapper">
                    <button type="button" class="menu-item" id="menu-btn-memo" data-target="view-memo">
                        <i class="fa-regular fa-file-lines"></i> <span>메모장 & 고정메모</span>
                    </button>
                    <div id="sidebar-memo-folders" class="sidebar-sub-list hidden"></div>
                </div>
                
                <div class="menu-group-wrapper">
                    <button type="button" class="menu-item" id="menu-btn-math" data-target="view-math">
                        <i class="fa-solid fa-book-open"></i> <span>과목별 오답노트</span>
                    </button>
                    <div id="sidebar-sub-folders" class="sidebar-sub-list hidden"></div>
                </div>
            </nav>
            <div class="sidebar-footer" id="live-clock">00:00:00</div>
        </aside>

        <main class="main-content">
            
            <div id="view-planner" class="content-view">
                <div class="view-header">
                    <div class="header-left-zone">
                        <button type="button" id="btn-open-sidebar" class="sidebar-toggle-outside hidden"><i class="fa-solid fa-bars"></i></button>
                        <h2 id="calendar-view-title">2026년 06월</h2>
                    </div>
                </div>

                <div class="planner-integrated-grid">
                    <div class="calendar-panel panel">
                        <div class="calendar-controls">
                            <button id="prev-month"><i class="fa-solid fa-chevron-left"></i></button>
                            <span id="calendar-month-year">June 2026</span>
                            <button id="next-month"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                        <div class="calendar-grid" id="calendar-days"></div>
                    </div>

                    <div class="daily-detail-stack">
                        <section class="panel">
                            <div class="panel-header">
                                <span class="panel-title" id="selected-date-label">오늘의 할 일</span>
                                <span class="badge" id="todo-stats">0/0 완료</span>
                            </div>
                            <form id="todo-form" class="inline-form">
                                <input type="text" id="todo-time-input" placeholder="시간" style="max-width: 70px;">
                                <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." required>
                                <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                            </form>
                            <ul id="todo-list" class="item-list"></ul>
                        </section>

                        <section class="panel month-summary-panel">
                            <div class="panel-header">
                                <span class="panel-title" style="color: #60a5fa;"><i class="fa-solid fa-list-check"></i> 이번 달 등록된 일정 모아보기</span>
                                <span class="badge" id="month-todo-count" style="background: rgba(96, 165, 250, 0.15); color: #93c5fd;">0개 등록됨</span>
                            </div>
                            <div id="month-summary-list" class="item-list">
                            </div>
                        </section>

                        <section class="panel">
                            <div class="panel-header">
                                <span class="panel-title"><i class="fa-regular fa-clock"></i> 하루 타임라인 정리 & 총평</span>
                                <span class="save-status" id="planner-save-status">자동 저장됨</span>
                            </div>
                            <div class="timeline-planner-wrapper">
                                <div class="timeline-row">
                                    <span class="timeline-hour">오전 (AM)</span>
                                    <input type="text" id="plan-am" class="planner-text-input" placeholder="오전 주요 일정 및 공부 계획을 정리하세요...">
                                </div>
                                <div class="timeline-row">
                                    <span class="timeline-hour">오후 (PM)</span>
                                    <input type="text" id="plan-pm" class="planner-text-input" placeholder="오후 핵심 스케줄을 기록하세요...">
                                </div>
                                <div class="timeline-row">
                                    <span class="timeline-hour">저녁 (EVE)</span>
                                    <input type="text" id="plan-eve" class="planner-text-input" placeholder="저녁 및 마무리 루틴을 정리하세요...">
                                </div>
                                <div class="timeline-review-zone">
                                    <span class="timeline-review-title">오늘 하루 총평 및 피드백</span>
                                    <textarea id="plan-review" class="planner-textarea-input" placeholder="오늘 지킨 점, 부족했던 점을 기록해 피드백하세요..."></textarea>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
