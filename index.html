<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Cloud Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar" id="main-sidebar">
            <div class="sidebar-brand">
                <div><i class="fa-solid fa-cloud text-accent-glow"></i> <span>WORKSPACE</span></div>
                <button type="button" id="btn-close-sidebar" class="sidebar-toggle-inside"><i class="fa-solid fa-angles-left"></i></button>
            </div>
            <nav class="sidebar-menu">
                <button type="button" class="menu-item active" data-target="view-planner">
                    <i class="fa-regular fa-calendar-days"></i> <span>통합 플래너 & 달력</span>
                </button>
                
                <div class="menu-group-wrapper">
                    <button type="button" class="menu-item" id="menu-btn-memo" data-target="view-memo">
                        <i class="fa-regular fa-lightbulb"></i> <span>아이디어 메모장</span>
                    </button>
                </div>

                <div class="menu-group-wrapper">
                    <div class="menu-group-title">수학 오답노트 시스템</div>
                    <button type="button" class="menu-item" id="menu-btn-math" data-target="view-math">
                        <i class="fa-solid fa-calculator"></i> <span>오답노트 홈</span>
                    </button>
                    <div class="sidebar-sub-folder-list" id="sidebar-sub-folders"></div>
                    <form id="sidebar-folder-add-form" class="sidebar-add-folder-input-group" onsubmit="event.preventDefault();">
                        <input type="text" id="new-folder-name-input" placeholder="+ 새 단원 폴더 추가..." required>
                    </form>
                </div>
            </nav>
        </aside>

        <button type="button" id="btn-open-sidebar" class="sidebar-toggle-outside hidden">
            <i class="fa-solid fa-bars"></i>
        </button>

        <main class="main-content">
            
            <div id="view-planner" class="content-view">
                <header class="view-header">
                    <h1 class="view-title" id="calendar-view-title">통합 플래너 & 스케줄 클라우드</h1>
                </header>

                <div class="planner-integrated-grid">
                    
                    <section class="calendar-panel panel">
                        <div class="calendar-header-controls">
                            <h2 class="calendar-month-year" id="calendar-month-year">2026년 06월</h2>
                            <div class="calendar-nav-buttons">
                                <button type="button" id="btn-prev-month"><i class="fa-solid fa-chevron-left"></i></button>
                                <button type="button" id="btn-next-month"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="calendar-weekdays-grid">
                            <div class="weekday sun">일</div>
                            <div class="weekday">월</div>
                            <div class="weekday">화</div>
                            <div class="weekday">수</div>
                            <div class="weekday">목</div>
                            <div class="weekday">금</div>
                            <div class="weekday sat">토</div>
                        </div>
                        <div class="calendar-days-grid" id="calendar-days"></div>

                        <div class="month-summary-panel">
                            <div class="summary-header">
                                <span class="summary-title"><i class="fa-solid fa-chart-pie-simple"></i> 이번 달 일정 요약 <span class="click-tip">(클릭 시 해당 일자로 이동)</span></span>
                                <span class="summary-badge" id="month-todo-count">0개 대기 중</span>
                            </div>
                            <div class="item-list" id="month-summary-list"></div>
                        </div>
                    </section>

                    <div class="daily-detail-stack">
                        
                        <section class="panel">
                            <div class="panel-header">
                                <span class="panel-title"><i class="fa-solid fa-list-check"></i> <span id="selected-date-label">0000-00-00</span> 체크리스트</span>
                                <div class="todo-stats-mini" id="todo-stats">완료 0 / 전체 0</div>
                            </div>
                            
                            <form id="todo-form" class="todo-input-row" onsubmit="event.preventDefault();">
                                <input type="time" id="todo-time-input">
                                <input type="text" id="todo-input" placeholder="체크리스트 할 일을 입력하세요..." required>
                                <button type="submit" class="todo-submit-btn"><i class="fa-solid fa-plus"></i></button>
                            </form>

                            <div class="item-list" id="todo-list"></div>
                        </section>

                        <section class="panel">
                            <div class="panel-header">
                                <span class="panel-title"><i class="fa-regular fa-clock"></i> 시간 순 정렬 플래너</span>
                                <div class="planner-config-mini">
                                    <span id="planner-save-status">실시간 클라우드 연동</span>
                                </div>
                            </div>
                            
                            <form id="planner-direct-form" class="planner-inline-add-row" onsubmit="event.preventDefault();">
                                <input type="time" id="planner-direct-time" required>
                                <input type="text" id="planner-direct-text" placeholder="해당 시간에 진행할 플랜을 입력하세요..." required>
                                <button type="submit" class="planner-direct-btn"><i class="fa-solid fa-plus"></i></button>
                            </form>

                            <div class="timeline-planner-wrapper" id="timeline-hours-container"></div>

                            <div class="timeline-review-zone">
                                <span class="timeline-review-title">오늘 하루 총평 및 피드백</span>
                                <textarea id="plan-review" class="planner-textarea-input" placeholder="오늘 하루 성찰 피드백이나 일기를 자유롭게 기록하세요..."></textarea>
                            </div>
                        </section>

                    </div>
                </div>
            </div>

            <div id="view-memo" class="content-view hidden">
                <header class="view-header">
                    <h1 class="view-title">클라우드 실시간 메모 아카이브</h1>
                </header>
                <div class="memo-grid-layout">
                    <section class="panel memo-editor-panel">
                        <div class="panel-header">
                            <span class="panel-title"><i class="fa-regular fa-pen-to-square"></i> 새로운 생각 기록</span>
                        </div>
                        <input type="text" id="memo-title" class="memo-title-input" placeholder="메모 제목을 적어주세요...">
                        <textarea id="memo-content" class="memo-body-input" placeholder="자유로운 생각의 흐름을 클라우드에 즉시 동기화하세요..."></textarea>
                        <button id="btn-save-memo" class="btn-primary-action"><i class="fa-solid fa-cloud-arrow-up"></i> 메모 보관함에 추가</button>
                    </section>
                    <section class="panel memo-display-panel">
                        <div class="panel-header">
                            <span class="panel-title"><i class="fa-solid fa-box-archive"></i> 실시간 연동 보관 리스트</span>
                        </div>
                        <div class="memo-cards-container" id="memo-container"></div>
                    </section>
                </div>
            </div>

            <div id="view-math" class="content-view hidden">
                <header class="view-header">
                    <h1 class="view-title" id="math-view-title">수학 오답노트 AI 오거나이저</h1>
                    <button id="btn-open-type-modal" class="btn-secondary-action"><i class="fa-solid fa-sliders"></i> 문항 유형 설정</button>
                </header>

                <div class="math-dashboard-grid">
                    <section class="panel math-list-panel">
                        <div class="panel-header">
                            <span class="panel-title" id="math-folder-list-title"><i class="fa-solid fa-folder-open"></i> 선택된 단원 문항 리스트</span>
                            <button id="btn-new-math-item" class="btn-accent-sm"><i class="fa-solid fa-plus"></i> 새 문항 등록</button>
                        </div>
                        <div class="math-items-scroller" id="math-items-container"></div>
                    </section>

                    <div class="math-detail-side-stack">
                        <div class="panel math-editor-view" id="math-editor-panel">
                            <div class="panel-header">
                                <span class="panel-title" id="math-editor-title-label"><i class="fa-solid fa-square-poll-horizontal"></i> 문항 상세 정보 등록/수정</span>
                            </div>
                            <div class="math-editor-form-scroll">
                                <div class="form-group-row">
                                    <div class="form-field-unit">
                                        <label for="math-source">출처 / 시험명</label>
                                        <input type="text" id="math-source" placeholder="예: 2026년 3월 학평">
                                    </div>
                                    <div class="form-field-unit">
                                        <label for="math-number">문항 번호</label>
                                        <input type="number" id="math-number" placeholder="예: 21">
                                    </div>
                                </div>
                                <div class="form-group-row">
                                    <div class="form-field-unit">
                                        <label for="math-type-select">문항 유형</label>
                                        <select id="math-type-select"></select>
                                    </div>
                                    <div class="form-field-unit">
                                        <label for="math-difficulty">난이도 설정</label>
                                        <select id="math-difficulty">
                                            <option value="상">🔥 상 (킬러/준킬러)</option>
                                            <option value="중" selected>⚡ 중 (4점 일반)</option>
                                            <option value="하">🌱 하 (2,3점 기본)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group-row">
                                    <div class="form-field-unit">
                                        <label for="math-wrong-reason">오답 핵심 원인 분석</label>
                                        <select id="math-wrong-reason">
                                            <option value="개념 부족">📕 핵심 개념/공식 미숙지</option>
                                            <option value="조건 해석 실패">🔍 문제 조건 누락 및 기하적 해석 오류</option>
                                            <option value="계산 실수">✏️ 단순 연산 및 사칙연산 실수</option>
                                            <option value="시간 부족">⏱️ 풀이 프로세스 지연/시간 부족</option>
                                        </select>
                                    </div>
                                    <div class="form-field-unit">
                                        <label for="math-status">학습 진행 현황</label>
                                        <select id="math-status">
                                            <option value="다시 풀어야 함">❌ 다시 풀어야 함 (미해결)</option>
                                            <option value="복습 필요">🔄 풀었으나 핵심개념 복습 필요</option>
                                            <option value="완벽 이해 완료">✅ 정복 완료 (완벽히 이해함)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-field-unit full-width-field">
                                    <label for="math-question">발문 핵심 요약 및 유의사항</label>
                                    <input type="text" id="math-question" placeholder="예: 최고차항 계수가 1인 삼차함수 f(x)의 극대조건 유의">
                                </div>
                                <div class="form-field-unit full-width-field">
                                    <label for="math-solution">상세 풀이 전략 & 리마인드 코멘트</label>
                                    <textarea id="math-solution" placeholder="상세 풀이 과정을 기록하세요"></textarea>
                                </div>
                                <button id="math-save-btn" class="btn-save">오답노트 저장 / 수정</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="type-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-sliders"></i> 문항 유형 관리</h3>
                <button id="close-type-modal" class="modal-close-x">&times;</button>
            </div>
            <div class="modal-body">
                <form id="type-add-form" class="inline-form modal-input-group" onsubmit="event.preventDefault();">
                    <input type="text" id="new-type-input" placeholder="새로운 유형 이름을 입력하세요...">
                    <button type="button" id="btn-add-type" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                </form>
                <div class="modal-list-title">등록된 유형 리스트</div>
                <div id="custom-type-list" class="custom-type-manage-list"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
