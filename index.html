<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Workspace Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="top-bar">
            <div class="brand"><i class="fa-solid fa-layer-group"></i> WORKSPACE</div>
            <div id="live-clock" class="clock">00:00:00</div>
        </header>

        <main class="dashboard-grid">
            
            <div class="col">
                <section class="panel">
                    <div class="panel-header">
                        <span class="panel-title"><i class="fa-regular fa-calendar-check"></i> 오늘의 플래너</span>
                        <span class="badge" id="todo-stats">0 / 0 완료</span>
                    </div>
                    <form id="todo-form" class="inline-form">
                        <select id="todo-time">
                            <option value="일과">일과</option>
                            <option value="09:00">09:00</option>
                            <option value="12:00">12:00</option>
                            <option value="15:00">15:00</option>
                            <option value="18:00">18:00</option>
                            <option value="21:00">21:00</option>
                        </select>
                        <input type="text" id="todo-input" placeholder="새로운 계획을 입력하세요..." required>
                        <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                    </form>
                    <ul id="todo-list" class="item-list"></ul>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <span class="panel-title"><i class="fa-solid fa-fire"></i> 주요 디데이 일정</span>
                    </div>
                    <form id="dday-form" class="inline-form dday-form-custom">
                        <input type="text" id="dday-title" placeholder="목표/시험 이름" required>
                        <div class="date-input-wrapper">
                            <input type="date" id="dday-date" required>
                        </div>
                        <button type="submit" class="icon-btn-add"><i class="fa-solid fa-plus"></i></button>
                    </form>
                    <div id="dday-container" class="dday-grid"></div>
                </section>
            </div>

            <div class="col">
                <section class="panel memo-panel">
                    <div class="panel-header">
                        <span class="panel-title"><i class="fa-regular fa-folder-open"></i> 세분화 메모장</span>
                        <span class="save-status" id="save-status">안전하게 저장됨</span>
                    </div>
                    
                    <div class="folder-tabs">
                        <button class="tab-btn active" data-folder="general">📁 일반</button>
                        <button class="tab-btn" data-folder="idea">💡 아이디어</button>
                        <button class="tab-btn" data-folder="study">📝 학습</button>
                    </div>

                    <div class="textarea-wrapper">
                        <textarea id="memo-textarea" placeholder="이 폴더에 기록할 메모를 자유롭게 작성하세요..."></textarea>
                    </div>
                    
                    <div class="memo-footer">
                        <button id="save-memo-btn" class="btn-save"><i class="fa-regular fa-floppy-disk"></i> 메모 저장하기</button>
                    </div>
                </section>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
