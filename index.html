<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORKSPACE - 통합 플래너 & 달력</title>
  <style>
    /* 기본 테마 및 레이아웃 설정 (이미지 속 다크모드 스타일 반영) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0d0e12;
      color: #ffffff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 1. 왼쪽 사이드바 */
    .sidebar-left {
      width: 250px;
      background-color: #13151a;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1f232b;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 40px;
      color: #ffffff;
    }

    .menu-item {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      color: #8a8f98;
      font-weight: 600;
      transition: all 0.2s;
    }

    .menu-item.active {
      background-color: #ffffff;
      color: #000000;
    }

    /* 2. 메인 콘텐츠 영역 (달력 + 우측 플래너) */
    .main-content {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .main-header {
      font-size: 28px;
      font-weight: bold;
    }

    .content-body {
      display: flex;
      gap: 25px;
      flex: 1;
      height: calc(100% - 60px);
    }

    /* 3. 달력 섹션 */
    .calendar-section {
      flex: 1.3;
      background-color: #13151a;
      border-radius: 16px;
      padding: 25px;
      display: flex;
      flex-direction: column;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .calendar-header button {
      background: none;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      padding: 5px 10px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1px);
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      flex: 1;
    }

    .day-label {
      text-align: center;
      color: #565d68;
      font-weight: bold;
      font-size: 14px;
      padding-bottom: 10px;
    }

    .day-cell {
      background-color: #1a1d24;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      aspect-ratio: 1;
    }

    .day-cell:hover {
      background-color: #242933;
    }

    .day-cell.active {
      background-color: #ffffff;
      color: #000000;
      font-weight: bold;
    }

    /* 4. 우측 플래너 섹션 (디데이를 없애고 높이를 100%로 채움) */
    .planner-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%; /* 전체 높이 유지 */
    }

    .todo-card {
      background-color: #13151a;
      border-radius: 16px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      height: 100%; /* 부모 공간을 가득 채우도록 변경 */
    }

    .todo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .todo-stats {
      background-color: #1a1d24;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
      color: #8a8f98;
    }

    /* 일정 입력창 영역 */
    .todo-input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .time-input {
      width: 80px;
      background-color: #1a1d24;
      border: 1px solid #242933;
      border-radius: 8px;
      color: #fff;
      padding: 10px;
      text-align: center;
    }

    .text-input {
      flex: 1;
      background-color: #1a1d24;
      border: 1px solid #242933;
      border-radius: 8px;
      color: #fff;
      padding: 10px 15px;
    }

    .add-btn {
      background-color: #ffffff;
      color: #000000;
      border: none;
      border-radius: 8px;
      width: 40px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    /* 디데이가 사라져서 길어진 투두 리스트 아이템 영역 */
    .todo-list {
      flex: 1;
      overflow-y: auto; /* 내용이 많아지면 스크롤 생성 */
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 5px;
    }

    /* 스크롤바 커스텀 */
    .todo-list::-webkit-scrollbar {
      width: 6px;
    }
    .todo-list::-webkit-scrollbar-thumb {
      background-color: #242933;
      border-radius: 4px;
    }

    .todo-item {
      background-color: #1a1d24;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .todo-content {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .todo-time {
      color: #8a8f98;
      font-size: 14px;
      font-weight: 500;
    }

    .empty-msg {
      color: #565d68;
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="sidebar-left">
    <div class="logo">☁️ WORKSPACE</div>
    <div class="menu-item active">통합 플래너 & 달력</div>
    <div class="menu-item">메모장 & 고정메모</div>
    <div class="menu-item">과목별 오답노트</div>
  </div>

  <div class="main-content">
    <div class="main-header">2026년 06월</div>
    
    <div class="content-body">
      
      <div class="calendar-section">
        <div class="calendar-header">
          <button>&lt;</button>
          <h2>2026년 6월</h2>
          <button>&gt;</button>
        </div>
        <div class="calendar-grid">
          <div class="day-label">일</div><div class="day-label">월</div><div class="day-label">화</div><div class="day-label">수</div><div class="day-label">목</div><div class="day-label">금</div><div class="day-label">토</div>
          
          <div class="day-cell"></div><div class="day-cell">1</div><div class="day-cell">2</div><div class="day-cell">3</div><div class="day-cell">4</div><div class="day-cell">5</div><div class="day-cell">6</div>
          <div class="day-cell">7</div><div class="day-cell">8</div><div class="day-cell">9</div><div class="day-cell active" onclick="changeDate('6월 10일')">10</div><div class="day-cell" onclick="changeDate('6월 11일')">11</div><div class="day-cell" onclick="changeDate('6월 12일')">12</div><div class="day-cell">13</div>
          <div class="day-cell">14</div><div class="day-cell">15</div><div class="day-cell">16</div><div class="day-cell">17</div><div class="day-cell">18</div><div class="day-cell">19</div><div class="day-cell">20</div>
          <div class="day-cell">21</div><div class="day-cell">22</div><div class="day-cell">23</div><div class="day-cell">24</div><div class="day-cell">25</div><div class="day-cell">26</div><div class="day-cell">27</div>
          <div class="day-cell">28</div><div class="day-cell">29</div><div class="day-cell">30</div>
        </div>
      </div>

      <div class="planner-section">
        <div class="todo-card">
          <div class="todo-header">
            <h3 id="target-date">6월 10일 일정 관리</h3>
            <div class="todo-stats" id="todo-counter">0 / 0 완료</div>
          </div>

          <div class="todo-input-group">
            <input type="text" class="time-input" id="todo-time" placeholder="시간">
            <input type="text" class="text-input" id="todo-text" placeholder="할 일을 입력하세요...">
            <button class="add-btn" onclick="addTodo()">+</button>
          </div>

          <div class="todo-list" id="todo-container">
            <div class="empty-msg" id="empty-message">등록된 일정이 없습니다.</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    let todos = [];

    // 달력 날짜 클릭 시 우측 플래너 타이틀 변경 기능
    function changeDate(dateStr) {
      document.getElementById('target-date').innerText = `${dateStr} 일정 관리`;
      // 실제 구현 시 날짜별 데이터를 패치해오는 로직이 추가되면 좋습니다.
    }

    // 일정 추가 기능
    function addTodo() {
      const timeInput = document.getElementById('todo-time');
      const textInput = document.getElementById('todo-text');

      if (!textInput.value.trim()) return;

      const newTodo = {
        id: Date.now(),
        time: timeInput.value ? timeInput.value : '종일',
        text: textInput.value,
        completed: false
      };

      todos.push(newTodo);
      timeInput.value = '';
      textInput.value = '';
      
      renderTodos();
    }

    // 일정 삭제 기능
    function deleteTodo(id) {
      todos = todos.filter(todo => todo.id !== id);
      renderTodos();
    }

    // 화면 그리기 및 카운터 갱신
    function renderTodos() {
      const container = document.getElementById('todo-container');
      const counter = document.getElementById('todo-counter');
      
      if (todos.length === 0) {
        container.innerHTML = `<div class="empty-msg" id="empty-message">등록된 일정이 없습니다.</div>`;
        counter.innerText = '0 / 0 완료';
        return;
      }

      container.innerHTML = '';
      let completedCount = 0;

      todos.forEach(todo => {
        if (todo.completed) completedCount++;
        
        const item = document.createElement('div');
        item.className = 'todo-item';
        item.innerHTML = `
          <div class="todo-content">
            <span class="todo-time">[${todo.time}]</span>
            <span>${todo.text}</span>
          </div>
          <button style="background:none; border:none; color:#ff4d4d; cursor:pointer;" onclick="deleteTodo(${todo.id})">❌</button>
        `;
        container.appendChild(item);
      });

      counter.innerText = `${completedCount} / ${todos.length} 완료`;
    }
  </script>
</body>
</html>
